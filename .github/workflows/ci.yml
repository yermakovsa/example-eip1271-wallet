name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Foundry
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Check formatting
        run: forge fmt --check

      - name: Run tests
        run: forge test

      - name: Build
        run: forge build